name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-lint:
    name: Build, lint, Plugin Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Build block
        run: npm run build

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: composer:v2, cs2pr
          coverage: none

      - name: Install composer deps
        run: composer install --no-progress --prefer-dist

      - name: Run PHPCS (WordPress standard)
        run: vendor/bin/phpcs -q --report=checkstyle | cs2pr

      - name: Read version
        id: version
        run: |
          version=$(sed -n 's/^[[:space:]]*\*[[:space:]]*Version:[[:space:]]*\([^[:space:]]*\).*/\1/p' donatotomato.php | head -n1)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build distribution zip
        run: python3 build-zip.py

      - name: Extract zip to junction-free path
        run: |
          mkdir -p /tmp/plugin-check-extract
          unzip -q "donatotomato-${{ steps.version.outputs.version }}.zip" -d /tmp/plugin-check-extract

      # Plugin Check via direct wp-env invocation — the wordpress/plugin-check-action
      # has its own wp-env setup logic that conflicts with ours (it ignores a
      # pre-existing .wp-env.json in the repo root, then tries to spin up its own
      # environment, hitting "service cli is not running"). Skipping the action
      # and running the Plugin Check CLI directly inside our wp-env container is
      # simpler + works. Same end result: `wp plugin check donatotomato` runs
      # the official WordPress.org review tool against the extracted v1.3.0 zip.
      - name: Prepare wp-env config
        run: |
          cat > .wp-env.json <<'EOF'
          {
            "plugins": [ "/tmp/plugin-check-extract/donatotomato" ],
            "config": { "WP_DEBUG": true },
            "testsEnvironment": false
          }
          EOF

      - name: Start wp-env
        run: |
          npm install -g @wordpress/env
          wp-env start

      - name: Run Plugin Check (WordPress.org review tool)
        run: |
          wp-env run cli wp plugin install plugin-check --activate
          wp-env run cli wp plugin check donatotomato
