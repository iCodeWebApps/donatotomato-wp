name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-lint:
    name: Build, lint, Plugin Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Build block
        run: npm run build

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: composer:v2, cs2pr
          coverage: none

      - name: Install composer deps
        run: composer install --no-progress --prefer-dist

      - name: Run PHPCS (WordPress standard)
        run: vendor/bin/phpcs -q --report=checkstyle | cs2pr

      - name: Read version
        id: version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Build distribution zip
        run: python3 build-zip.py

      - name: Extract zip to junction-free path
        run: |
          mkdir -p /tmp/plugin-check-extract
          unzip -q "donatotomato-${{ steps.version.outputs.version }}.zip" -d /tmp/plugin-check-extract

      # wp-env config + boot must run BEFORE the Plugin Check action — the
      # action runs `wp plugin check` inside the wp-env container and fails
      # immediately with "Environment not initialized" otherwise. The .wp-env.json
      # is generated at runtime to point wp-env at the extracted v1.3.0 zip
      # (same path the action consumes via build-dir).
      - name: Prepare wp-env config
        run: |
          cat > .wp-env.json <<'EOF'
          {
            "plugins": [ "/tmp/plugin-check-extract/donatotomato" ],
            "config": { "WP_DEBUG": true }
          }
          EOF

      - name: Start wp-env
        run: |
          npm install -g @wordpress/env
          wp-env start

      - name: Run Plugin Check (WordPress.org review tool)
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: /tmp/plugin-check-extract/donatotomato
